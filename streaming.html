<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1280, initial-scale=1">
  <title>Eden del Biliardo - Streaming</title>
  <style>
    html, body {
      margin: 0;
      width: 1280px;
      height: 190px;
      overflow: hidden;
      background: transparent;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .bar {
      box-sizing: border-box;
      width: 1280px;
      height: 190px;
      display: grid;
      grid-template-columns: 1fr 270px 1fr;
      align-items: center;
      padding: 18px 32px;
      background: linear-gradient(90deg, rgba(6, 48, 32, .92), rgba(24, 112, 70, .88), rgba(6, 48, 32, .92));
      border: 6px solid rgba(231, 190, 92, .9);
    }

    .player {
      font-size: 42px;
      font-weight: 800;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .right {
      text-align: right;
    }

    .center {
      text-align: center;
    }

    .discipline {
      font-size: 22px;
      font-weight: 700;
      color: #f5d27b;
    }

    .score {
      font-size: 76px;
      line-height: 84px;
      font-weight: 900;
      letter-spacing: 0;
      color: #fff;
    }

    .sets {
      font-size: 22px;
      color: #dbeafe;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div class="player">Giocatore 1</div>
    <div class="center">
      <div class="discipline">Eden del Biliardo</div>
      <div class="score">0 - 0</div>
      <div class="sets">Set 0 - 0</div>
    </div>
    <div class="player right">Giocatore 2</div>
  </div>
</body>
</html>
